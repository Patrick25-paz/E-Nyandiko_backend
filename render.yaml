# Render Blueprint for E-Nyandiko backend
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: e-nyandiko-backend
    env: node
    plan: free
    buildCommand: npm ci && npm run render:build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: e-nyandiko-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: "*"

databases:
  - name: e-nyandiko-db
    plan: free
    databaseName: e_nyandiko
    user: e_nyandiko
